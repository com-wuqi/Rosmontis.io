name: Qodana Code Quality

on:
  workflow_dispatch:
  pull_request:

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      security-events: write       # 必要：允许自动上传 SARIF 到 Code Scanning
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run Qodana Scan
        uses: JetBrains/qodana-action@v2026.1
        with:
          pr-mode: false
          args: --linter jetbrains/qodana-python-community:2026.1
          # upload-sarif 默认为 true，无需额外配置
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
