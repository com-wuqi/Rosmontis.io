name: Qodana Code Quality

on:
  workflow_dispatch:
  pull_request:

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      security-events: write      # 确保有权限上传 SARIF 到 Code Scanning
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run Qodana Scan
        id: qodana                     # 1. 设置步骤 ID
        uses: JetBrains/qodana-action@v2026.1
        with:
          args: --linter jetbrains/qodana-python-community:2026.1
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4     # 2. 升级到 v4
        with:
          sarif_file: ${{ steps.qodana.outputs.sarif }} # 3. 使用动态输出路径
