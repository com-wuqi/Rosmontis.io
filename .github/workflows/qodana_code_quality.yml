name: Qodana Community
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      security-events: write        # 用于上传 SARIF 到 GitHub Code Scanning
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2024.3
        with:
          pr-mode: false            # 分析整个项目，而非仅 PR 变更
          results-dir: ${{ runner.temp }}/qodana/results
        env:
          QODANA_LICENSE_ONLY_TOKEN: community   # 社区版免费令牌

      - name: 'Upload SARIF to GitHub Code Scanning'
        if: success() || failure()   # 即使扫描发现问题也上传结果
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana_report.sarif.json
