name: Qodana Community
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2026.1
        with:
          pr-mode: false
          args: --image jetbrains/qodana-python-community:2026.1    # 使用 args 指定社区版镜像
          results-dir: ${{ runner.temp }}/qodana/results
        env:
          QODANA_LICENSE_ONLY_TOKEN: community

      - name: 'Upload SARIF to GitHub Code Scanning'
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana_report.sarif.json
